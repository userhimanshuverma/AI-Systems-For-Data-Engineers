---
# Kafka + Zookeeper setup for Day 05
# Usage:
#   docker compose up -d
#   docker compose down
#
# Kafka broker will be available at: localhost:9092
# Zookeeper will be available at:    localhost:2181
#
# After starting, verify with:
#   docker compose ps
#   docker exec -it kafka kafka-topics.sh --list --bootstrap-server localhost:9092

version: "3.8"

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168        # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824   # 1 GB per segment
      KAFKA_NUM_PARTITIONS: 3               # default partitions for auto-created topics
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

# ── USAGE NOTES ──────────────────────────────────────────────────────────────
#
# Start:
#   docker compose up -d
#
# Create a topic manually (optional — auto-create is enabled):
#   docker exec kafka kafka-topics.sh \
#     --create --topic user.events \
#     --partitions 3 --replication-factor 1 \
#     --bootstrap-server localhost:9092
#
# List topics:
#   docker exec kafka kafka-topics.sh --list --bootstrap-server localhost:9092
#
# Produce a test message:
#   docker exec -it kafka kafka-console-producer.sh \
#     --topic user.events --bootstrap-server localhost:9092
#
# Consume messages (from beginning):
#   docker exec -it kafka kafka-console-consumer.sh \
#     --topic user.events --from-beginning \
#     --bootstrap-server localhost:9092
#
# Stop:
#   docker compose down
#
# Stop and remove volumes:
#   docker compose down -v
